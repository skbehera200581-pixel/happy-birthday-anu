<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday ANANYA!</title>
    <!-- Canvas Confetti Library for the celebration effect -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-color: #ff6b81;
            --secondary-color: #feca57;
            --background-grad: linear-gradient(135deg, #ffeef8 0%, #e8f0fe 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--background-grad);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
            z-index: 10;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
            animation: bounce 2s infinite;
        }

        .message {
            color: #555;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .cake-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 30px auto;
        }

        .cake {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 90px;
            background: #f3a683;
            border-radius: 10px 10px 4px 4px;
            box-shadow: inset 0 -10px 0 rgba(0, 0, 0, 0.05);
        }

        .cake::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 25px;
            background: #f8a5c2;
            border-radius: 10px 10px 0 0;
        }

        .drips {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
        }

        .drip {
            width: 20px;
            height: 20px;
            background: #f8a5c2;
            border-radius: 50%;
        }

        .candles {
            position: absolute;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
        }

        .candle {
            position: relative;
            width: 10px;
            height: 40px;
            background: repeating-linear-gradient(45deg, #fff, #fff 5px, #3dc1d3 5px, #3dc1d3 10px);
            border-radius: 3px 3px 0 0;
        }

        .flame {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 20px;
            background: radial-gradient(ellipse at bottom, var(--secondary-color) 0%, #ff4d4d 100%);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 10px rgba(254, 202, 87, 0.8);
            animation: flicker 0.6s infinite alternate;
            cursor: pointer;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .flame.blown-out {
            opacity: 0;
            transform: translate(-50%, -10px) scale(0);
            pointer-events: none;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 129, 0.4);
        }

        .btn:hover {
            background-color: #ff4757;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 129, 0.6);
        }

        .balloon-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .balloon {
            position: absolute;
            bottom: -150px;
            width: 60px;
            height: 75px;
            border-radius: 50%;
            animation: float-up 12s infinite ease-in;
            opacity: 0.8;
        }

        @keyframes float-up {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(-110vh) rotate(20deg); opacity: 0; }
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); }
            100% { transform: translateX(-50%) scale(1.1) skewX(5deg); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .cry-emoji, .heart-emoji {
            position: absolute;
            top: -40px;
            animation-name: fall;
            animation-timing-function: linear;
            animation-fill-mode: forwards;
        }

        @keyframes fall {
            to { transform: translateY(220px); opacity: 0; }
        }

        /* Styling for your specific request */
        #finalMsg {
            text-align: right;
            color: #444;
            font-size: 1.1rem;
            line-height: 1.6;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="balloon-container" id="balloons"></div>

    <!-- Main Greeting Card -->
    <div class="card" id="cardMain">
        <h1 id="title">Happy Birthday!</h1>
        <p class="message" id="message">Wishing you a day filled with love and laughter. May the coming year bring you happiness and success!</p>

        <div class="cake-container">
            <div class="candles">
                <div class="candle"><div class="flame"></div></div>
                <div class="candle"><div class="flame"></div></div>
                <div class="candle"><div class="flame"></div></div>
            </div>
            <div class="cake"><div class="drips"><div class="drip"></div><div class="drip"></div><div class="drip"></div><div class="drip"></div></div></div>
        </div>

        <button class="btn" id="actionBtn" style="transform: translateY(-16px);">Next</button>
    </div>

    <!-- Second Slide -->
    <div class="card" id="slide2" style="display:none;">
        <div class="floating-q">Are you happy?</div>
        <div class="slide-buttons" id="slideButtons" style="position:relative; height:140px; margin-top: 20px;">
            <button class="btn" id="yesBtn">Yes</button>
            <button class="btn no-btn" id="noBtn" style="position: absolute;">No</button>
        </div>
    </div>

    <!-- Third Slide (Your Personal Message) -->
    <div class="card" id="slide3" style="display:none;">
        <p id="finalMsg"></p>
        <div style="margin-top:18px;"><button class="btn" id="slide3Next">Next</button></div>
    </div>

    <!-- Fourth Slide -->
    <div class="card" id="slide4" style="display:none;">
        <p id="thanksMsg" style="color:#444; font-size:1.1rem; line-height:1.6;">thank you to come my life and make me happy make more chalant in evry thing you are like my second mother (mummy 😋)</p>
        <div style="margin-top:18px;"><button class="btn" id="slide4Next">Next</button></div>
    </div>

    <!-- Fifth Slide -->
    <div class="card" id="slide5" style="display:none;">
        <div class="floating-q">Will you be my penguin?</div>
        <div style="margin-top:18px; display:flex; justify-content:center; gap:12px;">
            <button class="btn" id="pengYes">Yes</button>
            <button class="btn" id="pengNo">No</button>
        </div>
    </div>

    <!-- Sixth Slide -->
    <div class="card" id="slide6" style="display:none;">
        <div id="resultBox" style="color:#444; font-size:1.1rem; line-height:1.6; min-height:60px;"></div>
        <div class="cry-container" id="cryContainer"></div>
        <div style="margin-top:12px;">
            <button class="btn" id="goHomeBtn">Go Home</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // UPDATED CUSTOMIZATION
            const recipientName = "ANANYA (anu)"; 
            const yourSpecialParagraph = "Happy birthday ANANYA (anu) to the prettiest girl, i never want to see again. Who I love fiercely, even though you drive me absolutely crazy and completely own my soul 😙😙 (yours phulei🥰)";

            document.getElementById('title').innerText = `Happy Birthday, ${recipientName}!`;

            // Setup Balloons
            const balloonColors = ['#ff6b6b', '#ff9f43', '#0abde3', '#10ac84', '#ee5253'];
            const balloonContainer = document.getElementById('balloons');
            for (let i = 0; i < 15; i++) {
                const balloon = document.createElement('div');
                balloon.classList.add('balloon');
                balloon.style.backgroundColor = balloonColors[Math.floor(Math.random() * balloonColors.length)];
                balloon.style.left = `${Math.random() * 90}%`;
                balloon.style.animationDelay = `${Math.random() * 8}s`;
                balloonContainer.appendChild(balloon);
            }

            // Navigation Logic
            const flames = document.querySelectorAll('.flame');
            flames.forEach(f => f.addEventListener('click', () => {
                f.classList.add('blown-out');
                if(Array.from(flames).every(fl => fl.classList.contains('blown-out'))) triggerConfetti();
            }));

            document.getElementById('actionBtn').addEventListener('click', () => {
                document.getElementById('cardMain').style.display = 'none';
                document.getElementById('slide2').style.display = 'block';
                startNoFloating();
            });

            document.getElementById('yesBtn').addEventListener('click', () => {
                triggerConfetti();
                document.getElementById('slide2').style.display = 'none';
                document.getElementById('slide3').style.display = 'block';
                document.getElementById('finalMsg').innerText = yourSpecialParagraph;
                stopNoFloating();
            });

            document.getElementById('slide3Next').addEventListener('click', () => {
                document.getElementById('slide3').style.display = 'none';
                document.getElementById('slide4').style.display = 'block';
            });

            document.getElementById('slide4Next').addEventListener('click', () => {
                document.getElementById('slide4').style.display = 'none';
                document.getElementById('slide5').style.display = 'block';
            });

            document.getElementById('pengYes').addEventListener('click', () => {
                document.getElementById('slide5').innerHTML = `<div class="floating-q">Thank you for coming into Sahil's heart and life ❤️</div>`;
                triggerConfetti();
            });

            document.getElementById('pengNo').addEventListener('click', () => {
                document.getElementById('slide5').style.display = 'none';
                document.getElementById('slide6').style.display = 'block';
                document.getElementById('resultBox').innerText = "It's ok 👍 thanks";
            });

            document.getElementById('goHomeBtn').addEventListener('click', () => window.location.reload());

            // Floating "No" Button logic
            let noInterval;
            const noBtn = document.getElementById('noBtn');
            function startNoFloating() {
                noInterval = setInterval(() => {
                    const rect = document.getElementById('slideButtons').getBoundingClientRect();
                    noBtn.style.left = Math.random() * (rect.width - 50) + "px";
                    noBtn.style.top = Math.random() * (rect.height - 40) + "px";
                }, 400);
            }
            function stopNoFloating() { clearInterval(noInterval); }

            function triggerConfetti() {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }
        });
    </script>
</body>
</html>
