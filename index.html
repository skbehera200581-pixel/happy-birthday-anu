<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday ANANYA!</title>
    <!-- Canvas Confetti Library for the celebration effect -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-color: #ff6b81;
            --secondary-color: #feca57;
            --background-grad: linear-gradient(135deg, #ffeef8 0%, #e8f0fe 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--background-grad);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
            z-index: 10;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        /* First slide is visible initially */
        .card.active {
            display: block;
            opacity: 1;
        }

        h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
            animation: bounce 2s infinite;
        }

        .message {
            color: #555;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .cake-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 30px auto;
        }

        .cake {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 90px;
            background: #f3a683;
            border-radius: 10px 10px 4px 4px;
            box-shadow: inset 0 -10px 0 rgba(0, 0, 0, 0.05);
        }

        .cake::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 25px;
            background: #f8a5c2;
            border-radius: 10px 10px 0 0;
        }

        .drips {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
        }

        .drip {
            width: 20px;
            height: 20px;
            background: #f8a5c2;
            border-radius: 50%;
        }

        .candles {
            position: absolute;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
        }

        .candle {
            position: relative;
            width: 10px;
            height: 40px;
            background: repeating-linear-gradient(45deg, #fff, #fff 5px, #3dc1d3 5px, #3dc1d3 10px);
            border-radius: 3px 3px 0 0;
        }

        .flame {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 20px;
            background: radial-gradient(ellipse at bottom, var(--secondary-color) 0%, #ff4d4d 100%);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 10px rgba(254, 202, 87, 0.8);
            animation: flicker 0.6s infinite alternate;
            cursor: pointer;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .flame.blown-out {
            opacity: 0;
            transform: translate(-50%, -10px) scale(0);
            pointer-events: none;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 129, 0.4);
        }

        .btn:hover {
            background-color: #ff4757;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 129, 0.6);
        }

        .balloon-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .balloon {
            position: absolute;
            bottom: -150px;
            width: 60px;
            height: 75px;
            border-radius: 50%;
            animation: float-up 12s linear forwards;
            opacity: 0.8;
        }

        @keyframes float-up {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-120vh) rotate(20deg); opacity: 0; }
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); }
            100% { transform: translateX(-50%) scale(1.1) skewX(5deg); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Message Aligned to Right */
        #finalMsg {
            text-align: right;
            color: #444;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .floating-q {
            font-size: 1.4rem;
            color: #ff6b81;
            font-weight: bold;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
    <div class="balloon-container" id="balloons"></div>

    <!-- Main Greeting Card -->
    <div class="card active" id="cardMain">
        <h1 id="title">Happy Birthday!</h1>
        <p class="message" id="message">Wishing you a day filled with love and laughter. Blow out the candles and click Next!</p>

        <div class="cake-container">
            <div class="candles">
                <div class="candle"><div class="flame"></div></div>
                <div class="candle"><div class="flame"></div></div>
                <div class="candle"><div class="flame"></div></div>
            </div>
            <div class="cake"><div class="drips"><div class="drip"></div><div class="drip"></div><div class="drip"></div><div class="drip"></div></div></div>
        </div>

        <button class="btn" id="actionBtn" style="transform: translateY(-16px);">Next</button>
    </div>

    <!-- Second Slide (Are you happy?) -->
    <div class="card" id="slide2">
        <div class="floating-q">Are you happy?</div>
        <div class="slide-buttons" id="slideButtons" style="position:relative; height:180px; margin-top: 20px; border: 1px dashed #eee; border-radius: 12px; display: flex; justify-content: center; align-items: center;">
            <button class="btn" id="yesBtn">Yes</button>
            <!-- Floating No Button -->
            <button class="btn no-btn" id="noBtn" style="position: absolute; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);">No</button>
        </div>
    </div>

    <!-- Third Slide (Personal Message) -->
    <div class="card" id="slide3">
        <p id="finalMsg"></p>
        <div style="margin-top:18px;"><button class="btn" id="slide3Next">Next</button></div>
    </div>

    <!-- Fourth Slide (Second Mother Message) -->
    <div class="card" id="slide4">
        <p id="thanksMsg" style="color:#444; font-size:1.1rem; line-height:1.6;">Thank you for coming into my life, making me happy, and making me more chalant in everything. You are like my second mother (mummy 😋)</p>
        <div style="margin-top:18px;"><button class="btn" id="slide4Next">Next</button></div>
    </div>

    <!-- Fifth Slide (Penguin Question) -->
    <div class="card" id="slide5">
        <div style="font-size: 3.5rem; margin-bottom: 10px; animation: bounce 3s infinite;">🐧❤️🐧</div>
        <div class="floating-q">Will you be my penguin?</div>
        <div style="margin-top:18px; display:flex; justify-content:center; align-items:center; gap:12px; min-height: 80px;">
            <button class="btn" id="pengYes">Yes</button>
            <button class="btn" id="pengNo" style="transition: all 0.2s ease;">No</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const recipientName = "ANANYA (anu)"; 
            const yourSpecialParagraph = "Happy Birthday, ANANYA (anu)! To the prettiest girl, whom I never want to see sad again. I love you fiercely, even though you drive me absolutely crazy and completely own my soul 😙😙 (yours, phulei 🥰)";

            document.getElementById('title').innerText = `Happy Birthday, ${recipientName}!`;

            // Continuous Balloon Generator
            const balloonColors = ['#ff6b6b', '#ff9f43', '#0abde3', '#10ac84', '#ee5253'];
            const balloonContainer = document.getElementById('balloons');

            function createBalloon() {
                const balloon = document.createElement('div');
                balloon.classList.add('balloon');
                balloon.style.backgroundColor = balloonColors[Math.floor(Math.random() * balloonColors.length)];
                balloon.style.left = `${Math.random() * 95}%`;
                
                // Add minor size variance for a natural feel
                const size = Math.random() * 20 + 50; // 50px to 70px
                balloon.style.width = `${size}px`;
                balloon.style.height = `${size * 1.25}px`;
                
                // Random float duration
                balloon.style.animationDuration = `${Math.random() * 6 + 6}s`; // 6s to 12s
                balloonContainer.appendChild(balloon);

                // Clean up balloon after animation completes
                setTimeout(() => {
                    balloon.remove();
                }, 12000);
            }

            // Generate initial batch, then keep spawning
            for (let i = 0; i < 8; i++) {
                createBalloon();
            }
            setInterval(createBalloon, 1200);

            // Candle Interaction
            const flames = document.querySelectorAll('.flame');
            flames.forEach(f => f.addEventListener('click', () => {
                f.classList.add('blown-out');
                if(Array.from(flames).every(fl => fl.classList.contains('blown-out'))) triggerConfetti();
            }));

            // Navigation helper with fade transitions
            function transitionTo(currentId, nextId) {
                const current = document.getElementById(currentId);
                const next = document.getElementById(nextId);

                current.style.opacity = '0';
                setTimeout(() => {
                    current.style.display = 'none';
                    current.classList.remove('active');
                    
                    next.style.display = 'block';
                    // Trigger reflow to let transition take effect
                    next.offsetHeight; 
                    next.classList.add('active');
                    next.style.opacity = '1';
                }, 400);
            }

            // Slide Navigation Triggers
            document.getElementById('actionBtn').addEventListener('click', () => {
                transitionTo('cardMain', 'slide2');
                resetNoButton(); // Position No button nicely to start
            });

            document.getElementById('yesBtn').addEventListener('click', () => {
                triggerConfetti();
                transitionTo('slide2', 'slide3');
                document.getElementById('finalMsg').innerText = yourSpecialParagraph;
            });

            document.getElementById('slide3Next').addEventListener('click', () => {
                transitionTo('slide3', 'slide4');
            });

            document.getElementById('slide4Next').addEventListener('click', () => {
                transitionTo('slide4', 'slide5');
            });

            // Runaway "No" Button Interaction (Slide 2)
            const noBtn = document.getElementById('noBtn');
            const box = document.getElementById('slideButtons');

            function moveNoButton() {
                const boxWidth = box.clientWidth;
                const boxHeight = box.clientHeight;
                const btnWidth = noBtn.offsetWidth;
                const btnHeight = noBtn.offsetHeight;

                // Max safe boundaries inside dotted box
                const maxLeft = boxWidth - btnWidth - 15;
                const maxTop = boxHeight - btnHeight - 15;

                const newLeft = Math.max(15, Math.random() * maxLeft);
                const newTop = Math.max(15, Math.random() * maxTop);

                noBtn.style.left = `${newLeft}px`;
                noBtn.style.top = `${newTop}px`;
            }

            function resetNoButton() {
                noBtn.style.left = "70%";
                noBtn.style.top = "40%";
            }

            // Instantly moves away on hover or mobile tap
            noBtn.addEventListener('mouseover', moveNoButton);
            noBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                moveNoButton();
            });

            // Playful No Button Logic (Slide 5)
            const pengNo = document.getElementById('pengNo');
            const pengYes = document.getElementById('pengYes');
            let noClickCount = 0;
            const noTexts = [
                "No",
                "Are you sure? 🥺",
                "Really? 💔",
                "Think again! 🐧",
                "Please? Say Yes! ❤️"
            ];

            pengNo.addEventListener('click', () => {
                noClickCount++;
                if (noClickCount < noTexts.length) {
                    pengNo.innerText = noTexts[noClickCount];
                    // Make Yes button grow and space out
                    const currentScale = 1 + (noClickCount * 0.25);
                    pengYes.style.transform = `scale(${currentScale})`;
                    pengYes.style.marginRight = `${noClickCount * 15}px`;
                } else {
                    // Hide the No button entirely if they keep trying
                    pengNo.style.display = 'none';
                }
            });

            document.getElementById('pengYes').addEventListener('click', () => {
                document.getElementById('slide5').innerHTML = `
                    <div style="font-size: 4rem; margin-bottom: 10px;">🐧❤️🐧</div>
                    <div class="floating-q">Thank you for coming into Sahil's heart and life ❤️</div>
                `;
                triggerConfetti();
                // Continuous confetti show
                setTimeout(triggerConfetti, 500);
                setTimeout(triggerConfetti, 1000);
            });

            function triggerConfetti() {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }
        });
    </script>
</body>

</html>
